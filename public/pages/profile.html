<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
       <script src="../js/middleware.js"></script>
    <script src="../js/profile.js" defer></script>
    <script src="../js/components/navbar.js" defer></script>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav>
      <div class="navbar">
        <div class="logo">
          <i
            class="fa-solid fa-hand-holding-heart fa-xl"
            style="color: #06a77d"
          ></i>
          <p>Fund</p>
        </div>

        <div class="nav-menu">
          <div class="nav-left"></div>
          <div class="nav-right"></div>
        </div>
        <div class="mobile-nav">
          <i class="fa-solid fa-bars" style="color: #06a77d"></i>
        </div>
      </div>
    </nav>
    <main class="profile-container">
      <div class="user-info">
        <h1>User Dashboard</h1>
        <p>Welcome back to your funding overview.</p>
      </div>
      <div class="dashboard-grid">
        <section class="dashboard-section">
          <div class="section-title">
            <h2>My Pledges</h2>
          </div>
          <div id="pledge-list" class="list-container"></div>
        </section>

        <section class="dashboard-section">
          <div class="section-title">
            <h2>Created Campaigns</h2>
          </div>
          <div id="campaign-list" class="list-container"></div>
        </section>
      </div>
    </main>
  </body>
</html>
