<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../js/middleware.js"></script>
    <script src="../js/campaign.js" defer></script>
    <script src="../js/components/navbar.js" defer></script>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/campaign.css" />
  </head>
  <body>
    <nav>
      <div class="navbar">
        <div class="logo">
          <i
            class="fa-solid fa-hand-holding-heart fa-xl"
            style="color: #06a77d"
          ></i>
          <p>Fund</p>
        </div>

        <div class="nav-menu">
          <div class="nav-left"></div>
          <div class="nav-right"></div>
        </div>
        <div class="mobile-nav">
          <i class="fa-solid fa-bars" style="color: #06a77d"></i>
        </div>
      </div>
    </nav>
    <div class="campaign-container">
      <div class="form-header">
        <h1>Launch Your Campaign</h1>
        <p>
          Fill out the details below to start raising funds for your project.
        </p>
      </div>

      <form id="campaign-form">
        <div class="form-group">
          <label for="title">Project Title</label>
          <input
            type="text"
            id="title"
            placeholder="Enter project's title"
            required
          />
        </div>

        <div class="form-group">
          <label for="description">Project Description</label>
          <textarea
            id="description"
            rows="5"
            placeholder="Enter project's description"
            required
          ></textarea>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="" disabled selected>Select a category</option>
            <option value="Technology">Technology</option>
            <option value="Education">Education</option>
            <option value="Health">Health</option>
            <option value="Environment">Environment</option>
            <option value="Community">Community</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="goal">Funding Goal ($)</label>
            <input type="number" id="goal" placeholder="e.g 5000" required />
          </div>

          <div class="form-group">
            <label for="deadline">End Date</label>
            <input type="date" id="deadline" required />
          </div>
        </div>

        <div class="form-group">
          <label for="image">Project Image</label>
          <div class="file-input-container">
            <input type="file" id="image" accept="image/*" required />
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>Click to upload a cover photo</span>
          </div>
        </div>
        <button type="submit" id="submit-campaign">Launch Campaign</button>
      </form>
    </div>
  </body>
</html>
